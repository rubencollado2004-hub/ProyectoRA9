version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: musica_mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: musica_db
      MYSQL_USER: musica_user
      MYSQL_PASSWORD: musica_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - musica_network

volumes:
  mysql_data:

networks:
  musica_network:
    driver: bridge